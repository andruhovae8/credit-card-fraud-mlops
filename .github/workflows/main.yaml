name: Lab5 CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 apache-airflow==2.9.3

      - name: Lint
        run: |
          flake8 src scripts dags tests --max-line-length=120

      - name: DAG integrity test
        run: |
          pytest -q tests/test_dag_import.py

      - name: Docker build
        run: |
          docker build -t fraud-mlops-lab5 .

      - name: Smoke train
        run: |
          python scripts/train_for_airflow.py \
            --train_path data/ci/train_sample.csv \
            --test_path data/ci/test_sample.csv \
            --target Class \
            --model rf \
            --model_out artifacts/model.pkl \
            --metrics_out artifacts/metrics.json