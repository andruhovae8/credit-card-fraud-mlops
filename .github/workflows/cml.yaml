name: CML CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest matplotlib

      - name: Pre-train tests
        run: |
          pytest -q tests/test_pretrain.py

      - name: Train model
        run: |
          python src/train_lab4.py \
            --train_path data/ci/train_sample.csv \
            --test_path data/ci/test_sample.csv \
            --target Class \
            --model rf \
            --max_rows 5000 \
            --model_out artifacts/model.pkl \
            --metrics_path artifacts/metrics.json \
            --cm_path artifacts/confusion_matrix.png

      - name: Post-train tests
        run: |
          pytest -q tests/test_posttrain.py

      - name: Generate report
        run: |
          echo "## Model Metrics" > report.md
          cat artifacts/metrics.json >> report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: report.md