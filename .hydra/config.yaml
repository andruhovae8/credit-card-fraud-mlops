model:
  name: rf
  n_estimators: 300
  max_depth: 10
  min_samples_leaf: 1
  C: 1.0
  max_iter: 1000
  learning_rate: 0.1
hpo:
  n_trials: 20
  sampler: tpe
  optimize_metric: pr_auc
  validation_size: 0.2
data:
  train_path: data/prepared/train.csv
  test_path: data/prepared/test.csv
  target: Class
preprocessing:
  scale_time_amount: false
  imbalance: none
threshold:
  value: 0.5
  tune_on_train: false
mlflow:
  experiment_name: MLOps_Lab_3_HPO
  parent_run_name: hpo_study
meta:
  author: student
  dataset_version: creditcard_v1
